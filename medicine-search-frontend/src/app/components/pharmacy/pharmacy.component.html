<div class="pharmacy-container">

  <!-- =====================================================
       TITLE
  ===================================================== -->
  <h2>Add Pharmacy</h2>

  <!-- PHARMACY NAME -->
  <input
    type="text"
    [(ngModel)]="newPharmacy.pharmacyName"
    name="pharmacyName"
    placeholder="Pharmacy name"
  />
  @if (submitted && errors.pharmacyName) {
    <div class="pharmacy-error">{{ errors.pharmacyName }}</div>
  }

  <!-- PHARMACY LOCATION -->
  <input
    type="text"
    [(ngModel)]="newPharmacy.pharmacyLocation"
    name="pharmacyLocation"
    placeholder="Pharmacy location"
  />
  @if (submitted && errors.pharmacyLocation) {
    <div class="pharmacy-error">{{ errors.pharmacyLocation }}</div>
  }

  <div class="pharmacy-form-actions">
    <button class="pharmacy-add-btn" (click)="createPharmacy()">Add Pharmacy</button>
    <button class="pharmacy-clear-btn" (click)="clearForm()">Clear</button>
  </div>

  <!-- POPUP DIALOG BOX -->
  <app-popup
    [visible]="popupVisible"
    [message]="popupMessage"
    [type]="popupType"
    (close)="closePopup()"
  ></app-popup>

</div>
