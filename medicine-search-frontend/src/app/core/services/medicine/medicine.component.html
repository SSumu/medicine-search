<div class="medicine-container">

  <!-- =====================================================
       TITLE
  ===================================================== -->
  <h2 class="medicine-title">Medicine Management</h2>

  <!-- =====================================================
       ADD MEDICINE FORM
  ===================================================== -->
  <div class="medicine-form">
    <h3>Add Medicine</h3>

    <!-- NAME -->
    <input
      type="text"
      placeholder="Name"
      [(ngModel)]="newMedicine.name"
      name="name"
      [ngClass]="{
      'error': submitted && !newMedicine.name,
      'success': newMedicine.name
      }"
    />

    <!-- MANUFACTURER -->
    <input
      type="text"
      placeholder="Manufacturer"
      [(ngModel)]="newMedicine.manufacturer"
      name="manufacturer"
      [ngClass]="{
      'error': submitted && !newMedicine.manufacturer,
      'success': newMedicine.manufacturer
      }"
    />

    <!-- PRICE -->
    <input
      type="text"
      placeholder="Price (Rs.)"
      [(ngModel)]="priceInput"
      name="price"
      (keydown)="onlyPriceInput($event)"
      (input)="formatPriceInput($event)"
      [ngClass]="{
      'error': submitted && !isValidPrice,
      'success': isValidPrice
      }"
    />

    <!-- DESCRIPTION -->
    <textarea
      placeholder="Description"
      [(ngModel)]="newMedicine.description"
      name="description"
      [ngClass]="{
      'error': submitted && !newMedicine.description,
      'success': newMedicine.description
      }"
    ></textarea>

    <!-- BUTTONS -->
    <div class="form-actions">
      <button class="add-btn" (click)="addMedicine()">Add Medicine</button>
      <button class="clear-btn" (click)="clearForm()">Clear</button>
    </div>
  </div>

</div>
